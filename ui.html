<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sonder Blocks Export</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0e1e30;
    --surface:      #13233C;
    --elevated:     #1a2f4a;
    --border:       #243d5c;
    --border-light: #2e4f72;
    --primary:      #355BFF;
    --primary-h:    #2a49e0;
    --primary-dim:  rgba(53,91,255,0.15);
    --text:         #ffffff;
    --text-muted:   #7a9abf;
    --text-dim:     #4a6a8a;
    --success:      #22c55e;
    --warning:      #f59e0b;
    --error:        #ef4444;
    --radius:       6px;
    --font:         -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .header-logo {
    width: 28px;
    height: 28px;
    background: var(--primary);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.2;
  }

  /* Body */
  .body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Section card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label svg { opacity: 0.6; }

  /* Row inside card */
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .row:last-child { border-bottom: none; }
  .row-label {
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }
  .row-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Toggle */
  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border-light);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--primary); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { left: 19px; }

  /* Number input */
  .input-wrap {
    display: flex;
    align-items: center;
    background: var(--elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 90px;
    flex-shrink: 0;
  }
  .input-wrap input {
    width: 60px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    font-family: var(--font);
    padding: 5px 8px;
    text-align: right;
    -moz-appearance: textfield;
  }
  .input-wrap input::-webkit-inner-spin-button,
  .input-wrap input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .input-unit {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 8px 0 2px;
    white-space: nowrap;
  }
  .input-wrap:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary-dim);
  }

  /* Footer / Export button */
  .footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .btn-export {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn-export:hover { background: var(--primary-h); }
  .btn-export:active { transform: scale(0.98); }
  .btn-export:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Status area */
  .status {
    margin-top: 10px;
    border-radius: var(--radius);
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .status.visible { display: block; }
  .status-inner {
    padding: 10px 12px;
    border-radius: var(--radius);
    border-left: 3px solid;
  }
  .status.success .status-inner { background: rgba(34,197,94,0.1); border-color: var(--success); color: #86efac; }
  .status.error   .status-inner { background: rgba(239,68,68,0.1);  border-color: var(--error);   color: #fca5a5; }
  .status.warning .status-inner { background: rgba(245,158,11,0.1); border-color: var(--warning); color: #fcd34d; }
  .status.info    .status-inner { background: var(--primary-dim);   border-color: var(--primary); color: #93b4ff; }

  .status-title { font-weight: 600; margin-bottom: 3px; }

  /* Warnings list */
  .warnings { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .warning-item {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 11px;
    color: #fcd34d;
    line-height: 1.4;
  }

  /* Preview tree */
  .preview-tree {
    padding: 4px 0;
    max-height: 160px;
    overflow-y: auto;
  }
  .preview-empty {
    padding: 7px 14px;
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }
  .preview-item {
    display: flex;
    align-items: center;
    padding: 1px 10px;
    gap: 4px;
    min-height: 18px;
  }
  .preview-item:hover { background: rgba(255,255,255,0.03); }
  .preview-indent {
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  .preview-indent-pipe {
    width: 12px;
    height: 18px;
    border-left: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-indent-elbow {
    width: 12px;
    height: 18px;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 9px;
    flex-shrink: 0;
  }
  .preview-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.02em;
    border-radius: 3px;
    padding: 1px 4px;
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1.4;
  }
  .preview-badge.core   { background: rgba(122,154,191,0.1);  color: var(--text-dim);   border: 1px solid var(--border); }
  .preview-badge.sonder { background: rgba(53,91,255,0.1);    color: #6e98ff;           border: 1px solid rgba(53,91,255,0.25); }
  .preview-badge.warn   { background: rgba(245,158,11,0.1);   color: #fcd34d;           border: 1px solid rgba(245,158,11,0.25); }
  .preview-label {
    font-size: 10px;
    color: var(--text-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .preview-warn-icon {
    font-size: 9px;
    flex-shrink: 0;
    color: var(--warning);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">S</div>
    <div>
      <div class="header-title">Sonder Blocks Export</div>
      <div class="header-sub">Figma → WordPress Blocks</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Image Export Settings -->
    <div class="card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="5.5" cy="7" r="1.5" stroke="currentColor" stroke-width="1.2"/>
          <path d="M1 11l3.5-3 3 2.5 2.5-3 4 3.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
        Image Export
      </div>

      <div class="row">
        <div>
          <div class="row-label">Export images</div>
          <div class="row-sub">Embed as base64 in output</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="exportImages" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <div class="row" id="row-maxsize">
        <div class="row-label">Max size</div>
        <div class="input-wrap">
          <input type="number" id="maxSize" value="1920" min="100" max="8000" step="10">
          <span class="input-unit">px</span>
        </div>
      </div>

      <div class="row" id="row-quality">
        <div class="row-label">JPG quality</div>
        <div class="input-wrap">
          <input type="number" id="jpgQuality" value="80" min="10" max="100" step="5">
          <span class="input-unit">%</span>
        </div>
      </div>
    </div>

    <!-- Selection Preview -->
    <div class="card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="14" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 5h8M4 8h5M4 11h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Selection Preview
      </div>
      <div class="preview-tree" id="previewTree">
        <div class="preview-empty">Select a layer to see block structure</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-export" id="btnExport">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4.5 6.5L8 10l3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Export to Clipboard
    </button>

    <!-- Status messages -->
    <div class="status" id="status">
      <div class="status-inner">
        <div class="status-title" id="status-title"></div>
        <div id="status-body"></div>
      </div>
    </div>

    <!-- Warnings -->
    <div class="warnings" id="warnings" style="display:none;margin-top:8px;"></div>
  </div>

</div>

<script>
  const previewTreeEl = document.getElementById('previewTree');

  // --- Preview rendering ---

  function badgeClass(blockType) {
    if (blockType === '__warning__') return 'warn';
    if (blockType.startsWith('sonder/')) return 'sonder';
    return 'core';
  }

  function shortLabel(blockType) {
    if (blockType === '__warning__') return '? unknown';
    return blockType.split('/').pop();
  }

  // Flatten the tree into rows with depth info for rendering
  function flattenPreview(nodes, rows, depth) {
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      rows.push({ node: node, depth: depth, isLast: i === nodes.length - 1 });
      if (node.children && node.children.length > 0) {
        flattenPreview(node.children, rows, depth + 1);
      }
    }
  }

  function renderPreview(nodes) {
    if (!nodes || nodes.length === 0) {
      previewTreeEl.innerHTML = '<div class="preview-empty">Select a layer to see block structure</div>';
      return;
    }

    var rows = [];
    flattenPreview(nodes, rows, 0);

    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var n   = row.node;
      var indent = '';
      for (var d = 0; d < row.depth; d++) {
        indent += '<span class="preview-indent-pipe"></span>';
      }
      if (row.depth > 0) {
        // Replace last pipe with elbow
        indent = indent.slice(0, indent.lastIndexOf('<span class="preview-indent-pipe"></span>'));
        indent += '<span class="preview-indent-elbow"></span>';
      }

      var bc   = badgeClass(n.blockType);
      var lbl  = shortLabel(n.blockType);
      var warn = n.hasIssue ? '<span class="preview-warn-icon">⚠</span>' : '';

      html += '<div class="preview-item">' +
        '<div class="preview-indent">' + indent + '</div>' +
        '<span class="preview-badge ' + bc + '">' + lbl + '</span>' +
        '<span class="preview-label">' + n.label + '</span>' +
        warn +
        '</div>';
    }

    previewTreeEl.innerHTML = html;
  }

  const exportImagesEl = document.getElementById('exportImages');
  const maxSizeEl      = document.getElementById('maxSize');
  const jpgQualityEl   = document.getElementById('jpgQuality');
  const btnExport      = document.getElementById('btnExport');
  const statusEl       = document.getElementById('status');
  const statusTitle    = document.getElementById('status-title');
  const statusBody     = document.getElementById('status-body');
  const warningsEl     = document.getElementById('warnings');

  // Toggle image settings rows when export images is toggled
  exportImagesEl.addEventListener('change', () => {
    const on = exportImagesEl.checked;
    document.getElementById('row-maxsize').style.opacity = on ? '1' : '0.4';
    document.getElementById('row-quality').style.opacity = on ? '1' : '0.4';
  });

  function showStatus(type, title, body) {
    statusEl.className = 'status visible ' + type;
    statusTitle.textContent = title;
    statusBody.textContent = body || '';
    statusEl.style.display = 'block';
  }

  function showWarnings(warnings) {
    if (!warnings || warnings.length === 0) {
      warningsEl.style.display = 'none';
      return;
    }
    warningsEl.innerHTML = warnings.map(w =>
      `<div class="warning-item">⚠ ${w}</div>`
    ).join('');
    warningsEl.style.display = 'flex';
  }

  btnExport.addEventListener('click', () => {
    btnExport.disabled = true;
    btnExport.textContent = 'Exporting…';
    statusEl.style.display = 'none';
    warningsEl.style.display = 'none';

    const settings = {
      exportImages: exportImagesEl.checked,
      maxSize:      parseInt(maxSizeEl.value) || 1920,
      jpgQuality:   parseInt(jpgQualityEl.value) || 80,
    };

    parent.postMessage({ pluginMessage: { type: 'export', settings } }, '*');
  });

  async function handleResizeImage(msg) {
    try {
      const bytes = new Uint8Array(msg.buffer);
      const mimeType = msg.ext === 'png' ? 'image/png'
        : msg.ext === 'gif'  ? 'image/gif'
        : msg.ext === 'webp' ? 'image/webp'
        : 'image/jpeg';
      const blob = new Blob([bytes], { type: mimeType });
      const bitmap = await createImageBitmap(blob);

      const longestEdge = Math.max(bitmap.width, bitmap.height);
      const scale = longestEdge > msg.maxSize ? msg.maxSize / longestEdge : 1;
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(bitmap.width  * scale);
      canvas.height = Math.round(bitmap.height * scale);
      canvas.getContext('2d').drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      bitmap.close();

      const outputMime = msg.ext === 'png' ? 'image/png' : 'image/jpeg';
      const outputExt  = msg.ext === 'png' ? 'png' : 'jpg';
      const dataUrl = canvas.toDataURL(outputMime, (msg.quality || 85) / 100);
      parent.postMessage({ pluginMessage: { type: 'image-resized', id: msg.id, dataUrl, ext: outputExt } }, '*');
    } catch (e) {
      parent.postMessage({ pluginMessage: { type: 'image-resized', id: msg.id, error: e.message } }, '*');
    }
  }

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    // Image resize request from main thread
    if (msg.type === 'resize-image') {
      handleResizeImage(msg);
      return;
    }

    // Preview update — doesn't touch the export button
    if (msg.type === 'preview') {
      renderPreview(msg.nodes);
      return;
    }

    // Re-enable button
    btnExport.disabled = false;
    btnExport.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4.5 6.5L8 10l3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Export to Clipboard`;

    if (msg.type === 'status') {
      showStatus('info', msg.message);
      btnExport.disabled = true;
      btnExport.textContent = msg.message;
      return;
    }

    if (msg.type === 'error') {
      showStatus('error', 'Export failed', msg.message);
      return;
    }

    if (msg.type === 'result') {
      // Copy to clipboard via textarea fallback (required in Figma iframe)
      try {
        const ta = document.createElement('textarea');
        ta.value = msg.markup;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const label = msg.stripped
          ? 'Copied! (images stripped — over 500kb)'
          : 'Copied to clipboard!';
        showStatus('success', label, msg.markup.split('\n').length + ' lines of block markup');
        showWarnings(msg.warnings);
      } catch (err) {
        showStatus('error', 'Clipboard failed', err.message);
      }
    }
  };
</script>

</body>
</html>
